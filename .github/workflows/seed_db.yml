name: Seed Production Database

on:
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  seed:
    runs-on: ubuntu-latest

    steps:
      - name: Load data.json on Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USERNAME }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script: |
            set -e
            cd /home/tarxemo/macshop
            
            echo "Flushing existing database..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py flush --noinput
            
            echo "Loading new data from data.json..."
            docker compose -f docker-compose.prod.yml exec -T web python manage.py loaddata data.json
            
            echo "Database seeded successfully!"
