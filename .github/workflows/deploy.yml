name: Build, Test & Deploy — MacShop

on:
  push:
    branches: [main]

jobs:

  # ── Run Django tests ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-not-used-in-production
          DEBUG: "True"
          # DB_NAME intentionally not set — falls back to SQLite for tests
        run: python manage.py test


  # ── Build & push Docker image ─────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/macshop:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/macshop:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/macshop:buildcache,mode=max


  # ── Deploy to Contabo ────────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USERNAME }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/tarxemo/macshop"

      - name: Deploy on Contabo
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USERNAME }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          script: |
            set -e
            cd /home/tarxemo/macshop

            # .env already exists on this server — never overwrite it here

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            
            # Seed the database
            echo "Waiting for container to start..."
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T web python manage.py flush --noinput
            docker compose -f docker-compose.prod.yml exec -T web python manage.py loaddata data.json