<div class="col-span-1 lg:col-span-12 flex flex-col items-center justify-center py-20 px-4 text-center bg-red-50 rounded-3xl border border-red-100 shadow-sm" id="checkout-form">
    <div class="w-20 h-20 bg-red-500 text-white rounded-full flex items-center justify-center mb-6 shadow-lg shadow-red-500/30">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </div>
    
    <h2 class="text-3xl font-extrabold text-red-900 mb-2">Payment Failed</h2>
    <p class="text-red-700 max-w-sm mx-auto mb-8 font-medium">
        We couldn't process your payment. Reason: {{ reason }}
    </p>
    
    <button onclick="window.location.reload();" class="inline-flex items-center justify-center px-8 py-3.5 text-sm font-bold text-accent-contrast bg-accent rounded-full hover:bg-accent-hover transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-accent hover:-translate-y-0.5">
        Try Again
    </button>
</div>
