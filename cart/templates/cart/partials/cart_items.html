{% if cart %}
    {% for item in cart %}
    <div class="product mb-5 flex pr-6">
        <a href="#" class="w-1/4">
            <img class="hover:shadow-lg rounded-xl" src="{{ item.product.get_thumbnail }}">
        </a>
        <div class="w-3/4 pl-6">
            <div class="flex justify-between">
                <a href="#" class="text-lg">
                    {{item.product.name}}
                </a>
                <span class="mb-6 pt-1 text-gray-400">TSH {{item.total_price|floatformat:2}}</span>
            </div>
            <hr>
            <div class="quantity mt-6 flex items-center space-x-4">
                <a href="#" 
                   class="p-3 bg-gray-100 hover:bg-gray-200"
                   hx-get="{% url 'update_cart' item.product.id 'decrement' %}"
                   hx-target="#cart-items"
                   hx-swap="innerHTML">-</a>
                <span>{{ item.quantity }}</span>
                <a href="#" 
                   class="p-3 bg-gray-100 hover:bg-gray-200"
                   hx-get="{% url 'update_cart' item.product.id 'increment' %}"
                   hx-target="#cart-items"
                   hx-swap="innerHTML">+</a>
            </div>
        </div>
    </div>
    {% endfor %}
{% else %}
    <p class="text-gray-500 text-center py-8">Your cart is empty.</p>
{% endif %}
