<div class="col-span-1 lg:col-span-12 flex flex-col items-center justify-center py-20 px-4 text-center bg-white rounded-3xl border border-slate-100 shadow-sm" hx-get="{% url 'check_payment_status' payment.id %}" hx-trigger="every 3s" hx-swap="outerHTML">
    <!-- Pulsing spinner -->
    <div class="relative w-24 h-24 mb-8">
        <div class="absolute inset-0 rounded-full border-4 border-slate-100"></div>
        <div class="absolute inset-0 rounded-full border-4 border-emerald-500 border-t-transparent animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center">
            <svg class="w-8 h-8 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
            </svg>
        </div>
    </div>
    
    <h2 class="text-2xl font-extrabold text-slate-900 mb-2">Check your phone!</h2>
    <p class="text-slate-500 max-w-sm mx-auto mb-6">
        We have sent a USSD prompt to <strong>{{ payment.phone_number }}</strong>. Please enter your PIN to authorize the payment of <strong>TSH {{ payment.amount|floatformat:2 }}</strong>.
    </p>
    
    <div class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 inline-flex items-center gap-3">
        <span class="relative flex h-3 w-3">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
        </span>
        <span class="text-sm font-semibold text-slate-700">Waiting for confirmation...</span>
    </div>
</div>
