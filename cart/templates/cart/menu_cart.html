<a href="{% url 'cart' %}" id="menu-cart-button" class="relative text-slate-700 hover:text-slate-900 transition-colors duration-200 group flex items-center justify-center p-2 rounded-full hover:bg-slate-50" aria-label="View Shopping Cart">
    <!-- Premium Shopping Bag SVG Icon -->
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-6 h-6 transform group-hover:scale-105 transition-transform duration-200">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
    </svg>
    
    <!-- Proportional Micro-Counter Badge -->
    {% if cart|length > 0 %}
    <span class="absolute -top-1 -right-1 w-5 h-5 bg-slate-900 text-white text-[10px] font-extrabold rounded-full flex items-center justify-center border-2 border-white shadow-sm transform group-hover:scale-110 transition-transform duration-200 select-none" aria-live="polite">
        {{ cart|length }}
    </span>
    {% endif %}
</a>
