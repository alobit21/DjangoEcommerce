<div class="group bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-all duration-300 flex flex-col h-full">
    <!-- Product Thumbnail -->
    <div class="relative overflow-hidden aspect-square bg-slate-50">
        <a href="{% url 'product' product.slug %}" class="block w-full h-full">
            <img src="{{ product.get_thumbnail }}" 
                 class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500 ease-out" 
                 alt="{{ product.name }}"
                 loading="lazy">
        </a>
    </div>
    
    <!-- Product Details -->
    <div class="p-5 flex flex-col flex-grow">
        <div class="flex justify-between items-start gap-4 mb-2">
            <h3 class="text-sm font-bold text-slate-900 group-hover:text-slate-600 transition-colors duration-200 line-clamp-2">
                <a href="{% url 'product' product.slug %}">{{ product.name }}</a>
            </h3>
            <span class="text-slate-900 font-bold text-sm whitespace-nowrap">{{ product.get_display_price }}</span>
        </div>
        
        <p class="text-slate-500 text-xs mb-4 line-clamp-2 flex-grow leading-relaxed">
            {{ product.description|default:"No description available." }}
        </p>
        
        <!-- Action Buttons -->
        <div class="flex items-center gap-2.5 pt-2 mt-auto">
            <a href="{% url 'product' product.slug %}" class="flex-grow text-center py-2.5 px-4 bg-slate-900 text-white text-xs font-semibold rounded-xl hover:bg-slate-800 transition-colors duration-200">
                View Details
            </a>
            <button hx-get="{% url 'add_to_cart' product.id %}"
                    hx-target="#menu-cart-button"
                    hx-swap="outerHTML"
                    class="p-2.5 bg-slate-50 text-slate-900 rounded-xl hover:bg-slate-900 hover:text-white transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-slate-900 flex items-center justify-center"
                    aria-label="Add {{ product.name }} to cart">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
            </button>
        </div>
    </div>
</div>
